name: Deploy Revendeo to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer-state:
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.filter.outputs.installer }}
      installer_exists: ${{ steps.remote.outputs.installer_exists }}
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect installer-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            installer:
              - 'apps/desktop/**'
              - 'packages/types/**'
              - 'packages/database/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

      - name: Check installer on VPS
        id: remote
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y sshpass

          if sshpass -p "${VPS_PASSWORD}" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@revendeo.com.br \
            "test -f /var/www/revendeo-downloads/revendeo-pdv-installer.exe"; then
            echo "installer_exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "installer_exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Decide if installer build is required
        id: decision
        env:
          DESKTOP_CHANGED: ${{ steps.filter.outputs.installer }}
          INSTALLER_EXISTS: ${{ steps.remote.outputs.installer_exists }}
        run: |
          set -euo pipefail

          if [ "${DESKTOP_CHANGED}" = "true" ] || [ "${INSTALLER_EXISTS}" != "true" ]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          else
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          fi

  build-installer:
    needs: installer-state
    if: needs.installer-state.outputs.should_build == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared workspace packages
        run: |
          pnpm --filter @pdv/types build
          pnpm --filter @pdv/database build
          pnpm --filter @pdv/ui build

      - name: Build Windows installer
        run: pnpm --filter @pdv/desktop dist:win

      - name: Normalize installer artifact
        shell: powershell
        run: |
          $installer = Get-ChildItem -Path "apps/desktop/release" -Filter "*.exe" -File -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Instalador .exe nao encontrado em apps/desktop/release"
          }

          New-Item -ItemType Directory -Force -Path "installer-artifact" | Out-Null
          Copy-Item $installer.FullName "installer-artifact/revendeo-pdv-installer.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: revendeo-installer
          path: installer-artifact/revendeo-pdv-installer.exe
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs:
      - installer-state
      - build-installer
    if: ${{ always() && needs.installer-state.result == 'success' && (needs.build-installer.result == 'success' || needs.build-installer.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download installer artifact
        if: needs.installer-state.outputs.should_build == 'true'
        uses: actions/download-artifact@v4
        with:
          name: revendeo-installer
          path: installer-artifact

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN != '' && secrets.GIT_TOKEN || github.token }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          host: revendeo.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 45m
          command_timeout: 45m
          envs: GIT_TOKEN,DATABASE_URL,LETSENCRYPT_EMAIL
          script: |
            set -euo pipefail

            APP_DIR="/root/revendeo"
            REPO_URL="https://github.com/fernandinhomartins40/pdv.git"

            disable_redundant_ubuntu_mirror_file() {
              local mirrors_file="/etc/apt/sources.list.d/ubuntu-mirrors.list"
              local disabled_file="${mirrors_file}.disabled-by-revendeo"

              if [ ! -f "${mirrors_file}" ]; then
                return
              fi

              if [ -f /etc/apt/sources.list ] && grep -Eq 'archive\.ubuntu\.com/ubuntu|security\.ubuntu\.com/ubuntu' /etc/apt/sources.list; then
                echo "Desativando ${mirrors_file} porque /etc/apt/sources.list ja cobre os repositorios Ubuntu"
                mv "${mirrors_file}" "${disabled_file}"
              fi
            }

            repair_ubuntu_mirrors() {
              local file
              local tmp

              shopt -s nullglob

              for file in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
                [ -f "${file}" ] || continue

                if ! grep -Eq 'mirror\.ufam\.edu\.br/ubuntu' "${file}"; then
                  continue
                fi

                tmp="$(mktemp)"
                sed -E 's#https?://mirror\.ufam\.edu\.br/ubuntu#http://archive.ubuntu.com/ubuntu#g' "${file}" > "${tmp}"

                if ! cmp -s "${file}" "${tmp}"; then
                  echo "Substituindo mirror Ubuntu invalido em ${file}"
                  mv "${tmp}" "${file}"
                else
                  rm -f "${tmp}"
                fi
              done

              shopt -u nullglob
            }

            normalize_apt_sources() {
              local file
              local tmp
              local line
              local normalized
              declare -A seen_entries=()

              shopt -s nullglob

              for file in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
                [ -f "${file}" ] || continue

                tmp="$(mktemp)"

                while IFS= read -r line || [ -n "${line}" ]; do
                  if [[ "${line}" =~ ^[[:space:]]*$ ]] || [[ "${line}" =~ ^[[:space:]]*# ]]; then
                    printf '%s\n' "${line}" >> "${tmp}"
                    continue
                  fi

                  normalized="$(printf '%s' "${line}" | tr -s '[:space:]' ' ' | sed -E 's/^ //; s/ $//')"

                  if [[ -z "${seen_entries[${normalized}]+x}" ]]; then
                    seen_entries["${normalized}"]=1
                    printf '%s\n' "${line}" >> "${tmp}"
                  fi
                done < "${file}"

                if ! cmp -s "${file}" "${tmp}"; then
                  echo "Normalizando entradas APT duplicadas em ${file}"
                  mv "${tmp}" "${file}"
                else
                  rm -f "${tmp}"
                fi
              done

              shopt -u nullglob
            }

            apt_update_with_recovery() {
              if apt-get update -y; then
                return
              fi

              echo "apt-get update falhou; aplicando fallback para mirrors oficiais do Ubuntu"
              repair_ubuntu_mirrors
              normalize_apt_sources
              apt-get update -y
            }

            disable_redundant_ubuntu_mirror_file
            normalize_apt_sources
            apt_update_with_recovery
            apt-get install -y git curl ca-certificates

            if [ -z "${GIT_TOKEN}" ]; then
              echo "GIT_TOKEN secret e obrigatorio porque o repositorio e privado."
              exit 1
            fi

            if [ ! -d "${APP_DIR}/.git" ]; then
              git clone "https://x-access-token:${GIT_TOKEN}@github.com/fernandinhomartins40/pdv.git" "${APP_DIR}"
            fi

            cd "${APP_DIR}"

            git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/fernandinhomartins40/pdv.git"

            git fetch origin main --prune
            git checkout main || git checkout -b main origin/main
            git reset --hard origin/main
            git clean -fdx -e .env.production -e .env.production.backup

            chmod +x scripts/install-vps.sh scripts/deploy-vps.sh
            PRIMARY_DOMAIN=revendeo.com.br \
            SECONDARY_DOMAIN=www.revendeo.com.br \
            WEB_PORT=3040 \
            API_PORT=3041 \
            DATABASE_URL="${DATABASE_URL}" \
            LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL}" \
            bash scripts/install-vps.sh

      - name: Prepare installer staging on VPS
        if: needs.installer-state.outputs.should_build == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: revendeo.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -euo pipefail
            mkdir -p /tmp/revendeo-installer-staging
            rm -f /tmp/revendeo-installer-staging/*

      - name: Upload installer to VPS
        if: needs.installer-state.outputs.should_build == 'true'
        uses: appleboy/scp-action@master
        with:
          host: revendeo.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: installer-artifact/revendeo-pdv-installer.exe
          target: /tmp/revendeo-installer-staging
          strip_components: 1

      - name: Publish installer on VPS
        if: needs.installer-state.outputs.should_build == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: revendeo.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -euo pipefail

            DOWNLOADS_DIR="/var/www/revendeo-downloads"
            STAGING_DIR="/tmp/revendeo-installer-staging"
            INSTALLER_FILENAME="revendeo-pdv-installer.exe"

            install -d -m 755 "${DOWNLOADS_DIR}"
            rm -f "${DOWNLOADS_DIR}"/*.exe
            install -m 644 "${STAGING_DIR}/${INSTALLER_FILENAME}" "${DOWNLOADS_DIR}/${INSTALLER_FILENAME}"
            rm -rf "${STAGING_DIR}"

      - name: Verify deployment
        if: success()
        run: |
          echo "Deploy concluido com sucesso"
          echo "Painel: https://revendeo.com.br"
          echo "Painel alternativo: https://www.revendeo.com.br"
          echo "API: https://revendeo.com.br/v1"
          echo "Health check: https://revendeo.com.br/health"
          echo "Pagina de download: https://revendeo.com.br/download"
          echo "Instalador: https://revendeo.com.br/downloads/revendeo-pdv-installer.exe"

          if [ "${{ needs.installer-state.outputs.should_build }}" = "true" ]; then
            echo "Instalador gerado e publicado nesta execucao."
          else
            echo "Instalador preservado sem rebuild, porque nao houve mudancas relevantes."
          fi
