name: Deploy Revendeo to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        with:
          host: revendeo.com.br
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 45m
          command_timeout: 45m
          envs: GIT_TOKEN,DATABASE_URL,LETSENCRYPT_EMAIL
          script: |
            set -euo pipefail

            APP_DIR="/root/revendeo"
            REPO_URL="https://github.com/fernandinhomartins40/pdv.git"

            normalize_apt_sources() {
              local file
              local tmp

              shopt -s nullglob

              for file in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
                [ -f "${file}" ] || continue

                tmp="$(mktemp)"

                awk '
                  /^[[:space:]]*#/ || /^[[:space:]]*$/ {
                    print
                    next
                  }
                  {
                    key = $0
                    gsub(/[[:space:]]+/, " ", key)
                    sub(/^ /, "", key)
                    sub(/ $/, "", key)
                  }
                  !seen[key]++ { print }
                ' "${file}" > "${tmp}"

                if ! cmp -s "${file}" "${tmp}"; then
                  echo "Normalizando entradas APT duplicadas em ${file}"
                  mv "${tmp}" "${file}"
                else
                  rm -f "${tmp}"
                fi
              done

              shopt -u nullglob
            }

            normalize_apt_sources
            apt-get update -y
            apt-get install -y git curl ca-certificates

            if [ ! -d "${APP_DIR}/.git" ]; then
              if [ -n "${GIT_TOKEN}" ]; then
                git clone "https://${GIT_TOKEN}@github.com/fernandinhomartins40/pdv.git" "${APP_DIR}"
              else
                git clone "${REPO_URL}" "${APP_DIR}"
              fi
            fi

            cd "${APP_DIR}"

            if [ -n "${GIT_TOKEN}" ]; then
              git remote set-url origin "https://${GIT_TOKEN}@github.com/fernandinhomartins40/pdv.git"
            else
              git remote set-url origin "${REPO_URL}"
            fi

            git fetch origin main --prune
            git checkout main || git checkout -b main origin/main
            git reset --hard origin/main
            git clean -fdx -e .env.production -e .env.production.backup

            chmod +x scripts/install-vps.sh scripts/deploy-vps.sh
            PRIMARY_DOMAIN=revendeo.com.br \
            SECONDARY_DOMAIN=www.revendeo.com.br \
            WEB_PORT=3040 \
            API_PORT=3041 \
            DATABASE_URL="${DATABASE_URL}" \
            LETSENCRYPT_EMAIL="${LETSENCRYPT_EMAIL}" \
            bash scripts/install-vps.sh

      - name: Verify deployment
        if: success()
        run: |
          echo "Deploy concluido com sucesso"
          echo "Painel: revendeo.com.br"
          echo "Painel alternativo: www.revendeo.com.br"
          echo "API: revendeo.com.br/v1"
          echo "Health check: revendeo.com.br/health"
          echo "HTTPS sera configurado automaticamente se LETSENCRYPT_EMAIL estiver definido."
