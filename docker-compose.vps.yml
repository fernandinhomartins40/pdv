services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3040}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DOWNLOADS_DIR:-/var/www/revendeo-downloads}:/usr/share/nginx/html/downloads:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - revendeo

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    env_file:
      - .env.production
    environment:
      PORT: "3000"
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY_IP:-host-gateway}"
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    networks:
      - revendeo

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    env_file:
      - .env.production
    environment:
      PORT: "3001"
    expose:
      - "3001"
    extra_hosts:
      - "host.docker.internal:${DOCKER_HOST_GATEWAY_IP:-host-gateway}"
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    security_opt:
      - no-new-privileges:true
    networks:
      - revendeo

  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-revendeo}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-revendeo_app}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-revendeo_local_password}
    volumes:
      - revendeo-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      - revendeo

networks:
  revendeo:
    driver: bridge

volumes:
  revendeo-postgres-data:
